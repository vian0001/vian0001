<svg width="1600" height="30" viewBox="0 0 1600 30" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="dividerGradient" x1="0" y1="0" x2="1600" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0" />
      <stop offset="50%" stop-color="#38BDF8" stop-opacity="1" />
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0" />
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-200%" width="140%" height="500%">
      <feGaussianBlur stdDeviation="6" />
    </filter>
  </defs>

  <rect x="40" y="14" width="1520" height="2" rx="1" fill="url(#dividerGradient)" />

  <circle cx="120" cy="15" r="4" fill="#38BDF8" filter="url(#softGlow)">
    <animate attributeName="cx" values="120;1480;120" dur="10s" repeatCount="indefinite" />
  </circle>
</svg>
