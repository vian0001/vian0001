<svg width="1600" height="320" viewBox="0 0 1600 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#050816" />
      <stop offset="50%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>

    <linearGradient id="line" x1="0" y1="0" x2="1600" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0" />
      <stop offset="50%" stop-color="#38BDF8" stop-opacity="1" />
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0" />
    </linearGradient>

    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="45" />
    </filter>
  </defs>

  <rect width="1600" height="320" rx="24" fill="url(#bg)" />

  <circle cx="220" cy="90" r="74" fill="#38BDF8" fill-opacity="0.14" filter="url(#blur)">
    <animate attributeName="cx" values="220;380;220" dur="12s" repeatCount="indefinite" />
    <animate attributeName="cy" values="90;130;90" dur="8s" repeatCount="indefinite" />
  </circle>

  <circle cx="1350" cy="110" r="82" fill="#7C3AED" fill-opacity="0.16" filter="url(#blur)">
    <animate attributeName="cx" values="1350;1200;1350" dur="11s" repeatCount="indefinite" />
    <animate attributeName="cy" values="110;150;110" dur="9s" repeatCount="indefinite" />
  </circle>

  <circle cx="800" cy="70" r="58" fill="#06B6D4" fill-opacity="0.12" filter="url(#blur)">
    <animate attributeName="cy" values="70;120;70" dur="7s" repeatCount="indefinite" />
  </circle>

  <rect x="100" y="72" width="1400" height="2" rx="1" fill="url(#line)" opacity="0.75" />
  <rect x="160" y="102" width="1280" height="1.5" rx="0.75" fill="url(#line)" opacity="0.45" />
  <rect x="220" y="132" width="1160" height="1.5" rx="0.75" fill="url(#line)" opacity="0.3" />

  <g opacity="0.95">
    <circle cx="120" cy="220" r="2.5" fill="#38BDF8">
      <animate attributeName="cx" values="120;1480" dur="16s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;1;1;0" dur="16s" repeatCount="indefinite" />
    </circle>
    <circle cx="1480" cy="180" r="2.5" fill="#A78BFA">
      <animate attributeName="cx" values="1480;120" dur="14s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;1;1;0" dur="14s" repeatCount="indefinite" />
    </circle>
  </g>

  <path d="M0 240C160 210 320 210 480 240C640 270 800 270 960 240C1120 210 1280 210 1440 240C1520 255 1560 265 1600 272V320H0V240Z" fill="#0B1220" fill-opacity="0.78" />
  <path d="M0 260C160 230 320 230 480 260C640 290 800 290 960 260C1120 230 1280 230 1440 260C1520 272 1560 280 1600 286V320H0V260Z" fill="#111827" fill-opacity="0.7" />
